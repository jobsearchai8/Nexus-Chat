<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#0D1117" />
    <title>Nexus Networks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Google Identity Services for popup-based sign-in -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      /* Hide the automatic Google One Tap overlay that appears on page load.
         We only want the prompt to show when the user clicks "Continue with Google". */
      #credential_picker_container,
      .g_id_signin,
      [id^="g_id_"],
      iframe[src*="accounts.google.com/gsi"] {
        display: none !important;
        visibility: hidden !important;
        position: absolute !important;
        left: -9999px !important;
        width: 0 !important;
        height: 0 !important;
        overflow: hidden !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="$VITE_ANALYTICS_ENDPOINT$/umami"
      data-website-id="$VITE_ANALYTICS_WEBSITE_ID$"></script>
  </body>

</html>
